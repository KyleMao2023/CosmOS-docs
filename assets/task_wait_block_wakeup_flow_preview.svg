  <text
     x="770"
     y="45"
     text-anchor="middle"
     font-size="21px"
     font-weight="700"
     id="text26">当前任务 Running</text>
  <text
     x="770"
     y="73"
     text-anchor="middle"
     font-size="15"
     id="text27"
     style="font-size:17.3333px">位于 Processor.current</text>
  <text
     x="770"
     y="188"
     text-anchor="middle"
     font-size="22px"
     font-weight="700"
     id="text28">prepare_to_wait(...)</text>
  <text
     x="395"
     y="220"
     font-size="15"
     id="text29"
     style="font-size:17.3333px">task_status = Interruptible</text>
  <text
     x="395"
     y="247"
     font-size="15"
     id="text30"
     style="font-size:17.3333px">wait_reason = Some(...)</text>
  <text
     x="395"
     y="274"
     font-size="15"
     id="text31"
     style="font-size:17.3333px">current_wq_handle = Some(...)</text>
  <text
     x="830"
     y="245"
     font-size="15"
     id="text32"
     style="font-size:17.3333px">将任务放入等待队列</text>
  <text
     x="142"
     y="216"
     text-anchor="middle"
     font-size="20px"
     font-weight="700"
     id="text33">WaitQueue</text>
  <text
     x="142"
     y="244"
     text-anchor="middle"
     font-size="15px"
     id="text34">保存等待任务及其 handle</text>
  <text
     x="770"
     y="408"
     text-anchor="middle"
     font-size="22px"
     font-weight="700"
     id="text35">block_current_and_run_next()</text>
  <text
     x="395"
     y="446"
     font-size="15"
     id="text36"
     style="font-size:17.3333px">从 Processor.current 取走当前任务</text>
  <text
     x="395"
     y="475"
     font-size="15"
     id="text37"
     style="font-size:17.3333px">确认任务仍应睡眠</text>
  <text
     x="830"
     y="446"
     font-size="15"
     id="text38"
     style="font-size:17.3333px">保存 TaskContext</text>
  <text
     x="830"
     y="475"
     font-size="15"
     id="text39"
     style="font-size:17.3333px">切回 idle / 调度器上下文</text>
  <text
     x="142"
     y="435"
     text-anchor="middle"
     font-size="16px"
     id="text40">idle / scheduler</text>
  <text
     x="142"
     y="462"
     text-anchor="middle"
     font-size="15px"
     id="text41">继续选择其他任务</text>
  <text
     x="770"
     y="610"
     text-anchor="middle"
     font-size="21px"
     font-weight="700"
     id="text42">任务 Sleeping / Interruptible</text>
  <text
     x="770"
     y="638"
     text-anchor="middle"
     font-size="15"
     id="text43"
     style="font-size:17.3333px">等待条件满足，不再占用 Processor.current</text>
  <text
     x="1320"
     y="614"
     text-anchor="middle"
     font-size="17px"
     font-weight="700"
     id="text44">等待条件满足</text>
  <text
     x="1320"
     y="638"
     text-anchor="middle"
     font-size="17px"
     font-weight="700"
     id="text45">或收到唤醒事件</text>
  <text
     x="770"
     y="740"
     text-anchor="middle"
     font-size="22px"
     font-weight="700"
     id="text46">wakeup_task(task)</text>
  <text
     x="395"
     y="772"
     font-size="15"
     id="text47"
     style="font-size:17.3333px">从等待队列取出任务</text>
  <text
     x="395"
     y="797"
     font-size="15"
     id="text48"
     style="font-size:17.3333px">清理等待状态 / handle</text>
  <text
     x="820"
     y="785"
     font-size="15"
     id="text49"
     style="font-size:17.3333px">放入目标 hart 运行队列</text>
  <text
     x="1390"
     y="755"
     text-anchor="middle"
     font-size="20px"
     font-weight="700"
     id="text50">目标 hart Run Queue</text>
  <text
     x="1390"
     y="785"
     text-anchor="middle"
     font-size="15px"
     id="text51">任务重新变为可运行状态</text>
