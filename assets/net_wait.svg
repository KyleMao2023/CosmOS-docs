<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 920 540"
   width="100%"
   height="100%"
   version="1.1"
   id="svg41"
   sodipodi:docname="net_wait.svg"
   inkscape:version="1.4.3 (0d15f75, 2025-12-25)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview41"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="2.9222222"
     inkscape:cx="326.29278"
     inkscape:cy="339.46768"
     inkscape:window-width="3200"
     inkscape:window-height="1876"
     inkscape:window-x="-12"
     inkscape:window-y="-12"
     inkscape:window-maximized="1"
     inkscape:current-layer="g40" />
  <defs
     id="defs9">
    <marker
       style="overflow:visible"
       id="Triangle"
       refX="0"
       refY="0"
       orient="auto-start-reverse"
       inkscape:stockid="Triangle arrow"
       markerWidth="1"
       markerHeight="1"
       viewBox="0 0 1 1"
       inkscape:isstock="true"
       inkscape:collect="always"
       preserveAspectRatio="xMidYMid">
      <path
         transform="scale(0.5)"
         style="fill:context-stroke;fill-rule:evenodd;stroke:context-stroke;stroke-width:1pt"
         d="M 5.77,0 -2.88,5 V -5 Z"
         id="path135" />
    </marker>
    <!-- 渐变色 -->
    <linearGradient
       id="sendHeader"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="100%">
      <stop
         offset="0%"
         stop-color="#52B788"
         id="stop1" />
      <stop
         offset="100%"
         stop-color="#34A0A4"
         id="stop2" />
    </linearGradient>
    <linearGradient
       id="irqHeader"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="100%">
      <stop
         offset="0%"
         stop-color="#1A759F"
         id="stop3" />
      <stop
         offset="100%"
         stop-color="#184E77"
         id="stop4" />
    </linearGradient>
    <linearGradient
       id="queueGrad"
       x1="0%"
       y1="0%"
       x2="0%"
       y2="100%">
      <stop
         offset="0%"
         stop-color="#FFFFFF"
         id="stop5" />
      <stop
         offset="100%"
         stop-color="#EBF5F5"
         id="stop6" />
    </linearGradient>
    <!-- 阴影 -->
    <filter
       id="shadow"
       x="-0.036666667"
       y="-0.18"
       width="1.0780952"
       height="1.41">
      <feGaussianBlur
         in="SourceAlpha"
         stdDeviation="3"
         id="feGaussianBlur6" />
      <feOffset
         dx="1"
         dy="2"
         id="feOffset6" />
      <feComponentTransfer
         id="feComponentTransfer6">
        <feFuncA
           type="linear"
           slope="0.08"
           id="feFuncA6" />
      </feComponentTransfer>
      <feMerge
         id="feMerge7">
        <feMergeNode
           id="feMergeNode6" />
        <feMergeNode
           in="SourceGraphic"
           id="feMergeNode7" />
      </feMerge>
    </filter>
    <!-- 箭头 -->
    <marker
       id="arrow-green"
       viewBox="0 0 10 10"
       refX="6"
       refY="5"
       markerWidth="6"
       markerHeight="6"
       orient="auto-start-reverse">
      <path
         d="M 0 1.5 L 8 5 L 0 8.5 z"
         fill="#3EA89B"
         id="path7" />
    </marker>
    <marker
       id="arrow-blue"
       viewBox="0 0 10 10"
       refX="6"
       refY="5"
       markerWidth="6"
       markerHeight="6"
       orient="auto-start-reverse">
      <path
         d="M 0 1.5 L 8 5 L 0 8.5 z"
         fill="#1E6091"
         id="path8" />
    </marker>
    <marker
       id="arrow-orange"
       viewBox="0 0 10 10"
       refX="6"
       refY="5"
       markerWidth="6"
       markerHeight="6"
       orient="auto-start-reverse">
      <path
         d="M 0 1.5 L 8 5 L 0 8.5 z"
         fill="#CA6702"
         id="path9" />
    </marker>
  </defs>
  <!-- 背景 -->
  <rect
     width="100%"
     height="100%"
     fill="#F4F8F8"
     id="rect9" />
  <!-- 页面标题 -->
  <g
     transform="translate(40, 40)"
     id="g10">
    <rect
       x="0"
       y="-15"
       width="6"
       height="30"
       fill="#34A0A4"
       rx="3"
       id="rect10" />
    <text
       x="18"
       y="8"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="16"
       font-weight="bold"
       fill="#1A759F"
       id="text10">VirtIO-net 描述符令牌化传输与异步回收流程</text>
  </g>
  <!-- ==================== 左侧：发送线程 send(frame) ==================== -->
  <g
     transform="translate(40, 70)"
     id="g24">
    <!-- 头部 -->
    <rect
       width="280"
       height="40"
       rx="6"
       fill="url(#sendHeader)"
       filter="url(#shadow)"
       id="rect11" />
    <text
       x="140"
       y="25"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="13"
       font-weight="bold"
       fill="#FFFFFF"
       text-anchor="middle"
       id="text11">发送线程 send(frame) [同步]</text>
    <!-- 时间轴 -->
    <line
       x1="140"
       y1="40"
       x2="140"
       y2="420"
       stroke="#3EA89B"
       stroke-width="2"
       stroke-dasharray="4,4"
       id="line11" />
    <!-- Step 1: transmit_begin -->
    <g
       transform="translate(15, 60)"
       filter="url(#shadow)"
       id="g14">
      <rect
         width="250"
         height="55"
         rx="4"
         fill="#FFFFFF"
         stroke="#3EA89B"
         stroke-width="1"
         id="rect12" />
      <text
         x="12"
         y="20"
         font-family="'Consolas', monospace"
         font-size="11"
         font-weight="bold"
         fill="#005F73"
         id="text12">transmit_begin</text>
      <text
         x="12"
         y="35"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="10"
         fill="#555"
         id="text13">申请并获得硬件描述符槽:</text>
      <text
         x="12"
         y="47"
         font-family="'Consolas', monospace"
         font-size="10"
         font-weight="bold"
         fill="#2D6A4F"
         id="text14">token = k (表示第 k 个描述符槽)</text>
    </g>
    <!-- Step 2: wait_selected -->
    <g
       transform="translate(15, 155)"
       filter="url(#shadow)"
       id="g18">
      <rect
         width="250"
         height="70"
         rx="4"
         fill="#FFFFFF"
         stroke="#3EA89B"
         stroke-width="1.2"
         id="rect14" />
      <text
         x="12"
         y="20"
         font-family="'Consolas', monospace"
         font-size="11"
         font-weight="bold"
         fill="#005F73"
         id="text15">wait_selected(token = k)</text>
      <text
         x="12"
         y="36"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="9.5"
         fill="#AE2012"
         font-weight="bold"
         id="text16">以 k 为等待键，将当前任务挂起</text>
      <text
         x="12"
         y="49"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="9.5"
         fill="#666"
         id="text17">进入 WaitQueueKeyed 并释放 CPU</text>
      <rect
         x="12"
         y="54"
         width="226"
         height="1"
         fill="#E0F2F1"
         id="rect17" />
      <text
         x="12"
         y="64"
         font-family="'Consolas', monospace"
         font-size="8.5"
         fill="#005F73"
         id="text18">tx_done[k] = false</text>
    </g>
    <!-- Step 3: Woken up & complete -->
    <g
       transform="translate(15, 295)"
       filter="url(#shadow)"
       id="g23">
      <rect
         width="250"
         height="110"
         rx="4"
         fill="#E8F8F5"
         stroke="#2D6A4F"
         stroke-width="1.5"
         id="rect18" />
      <text
         x="12"
         y="20"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="11"
         font-weight="bold"
         fill="#2D6A4F"
         id="text19">被唤醒 ➔ 执行收尾</text>
      <text
         x="12"
         y="42"
         font-family="'Consolas', monospace"
         font-size="10.5"
         font-weight="bold"
         fill="#005F73"
         id="text20">tx_token_ready(k) ➔ true</text>
      <text
         x="12"
         y="56"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="9.5"
         fill="#555"
         id="text21">读取 tx_done[k]，验证确认传输就绪</text>
      <rect
         x="12"
         y="65"
         width="226"
         height="1"
         fill="#94D2BD"
         id="rect21" />
      <text
         x="12"
         y="82"
         font-family="'Consolas', monospace"
         font-size="11"
         font-weight="bold"
         fill="#005F73"
         id="text22">transmit_complete(k)</text>
      <text
         x="12"
         y="96"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="9.5"
         fill="#555"
         id="text23">释放描述符槽 k，清空元数据</text>
    </g>
  </g>
  <!-- ==================== 中间：同步状态与等待队列 ==================== -->
  <g
     transform="translate(355, 130)"
     id="g29">
    <!-- 共享状态 -->
    <g
       filter="url(#shadow)"
       id="g27">
      <rect
         width="210"
         height="120"
         rx="6"
         fill="url(#queueGrad)"
         stroke="#94D2BD"
         stroke-width="1"
         id="rect24" />
      <text
         x="105"
         y="20"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="11"
         font-weight="bold"
         fill="#005F73"
         text-anchor="middle"
         id="text24">共享内存状态机制</text>
      <!-- Key Wait Queue -->
      <g
         transform="translate(10, 30)"
         id="g25">
        <rect
           width="190"
           height="35"
           rx="4"
           fill="#FFFFFF"
           stroke="#3EA89B"
           id="rect25" />
        <text
           x="10"
           y="21"
           font-family="'Consolas', monospace"
           font-size="9.5"
           fill="#005F73"
           id="text25">WaitQueueKeyed: [ Key: k ]</text>
      </g>
      <!-- tx_done Array -->
      <g
         transform="translate(10, 75)"
         id="g26">
        <rect
           width="190"
           height="35"
           rx="4"
           fill="#FFFFFF"
           stroke="#1A759F"
           id="rect26" />
        <text
           x="10"
           y="21"
           font-family="'Consolas', monospace"
           font-size="9.5"
           fill="#1A759F"
           id="text26">tx_done: [false, ..., false]</text>
      </g>
    </g>
    <!-- 交互流线 1: Send 挂起至 WaitQueue -->
    <path
       d="M -46,30 H -6"
       fill="none"
       stroke="#3ea89b"
       stroke-width="1.5"
       stroke-dasharray="3, 1"
       marker-end="url(#arrow-green)"
       id="path27" />
    <text
       x="-26"
       y="22"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="9px"
       fill="#005f73"
       text-anchor="middle"
       id="text27">挂起</text>
    <!-- 交互流线 2: 中断线程写入就绪 -->
    <path
       d="M 258,94 H 218"
       fill="none"
       stroke="#1e6091"
       stroke-width="1.5"
       stroke-dasharray="3, 1"
       marker-end="url(#arrow-blue)"
       id="path28" />
    <text
       x="238"
       y="86"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="9px"
       fill="#1a759f"
       text-anchor="middle"
       id="text28">置为 true</text>
    <!-- 交互流线 3: 唤醒原线程 -->
    <path
       d="M 105,65 V 200 H -166.10266"
       fill="none"
       stroke="#ca6702"
       stroke-width="1.8"
       marker-end="url(#arrow-orange)"
       id="path29"
       sodipodi:nodetypes="ccc"
       style="stroke:#02a4ca;stroke-opacity:1;marker-end:url(#Triangle)" />
    <text
       x="25"
       y="193"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="10.5"
       font-weight="bold"
       fill="#CA6702"
       text-anchor="middle"
       id="text29"
       style="fill:#02a4ca;fill-opacity:1">wake_selected(k)</text>
  </g>
  <!-- ==================== 右侧：中断回收线程 ==================== -->
  <g
     transform="translate(600, 70)"
     id="g41">
    <!-- 头部 -->
    <rect
       width="280"
       height="40"
       rx="6"
       fill="url(#irqHeader)"
       filter="url(#shadow)"
       id="rect29" />
    <text
       x="140"
       y="25"
       font-family="'Microsoft YaHei', sans-serif"
       font-size="13"
       font-weight="bold"
       fill="#FFFFFF"
       text-anchor="middle"
       id="text30">中断回收线程 [异步/硬件触发]</text>
    <!-- 时间轴 -->
    <line
       x1="140"
       y1="40"
       x2="140"
       y2="420"
       stroke="#1E6091"
       stroke-width="2"
       stroke-dasharray="4,4"
       id="line30" />
    <!-- Step 1: IRQ Entry -->
    <g
       transform="translate(15, 60)"
       filter="url(#shadow)"
       id="g32">
      <rect
         width="250"
         height="45"
         rx="4"
         fill="#FFFFFF"
         stroke="#1E6091"
         stroke-width="1"
         id="rect30" />
      <text
         x="12"
         y="18"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="11"
         font-weight="bold"
         fill="#184E77"
         id="text31">硬件 TX 中断抢入</text>
      <text
         x="12"
         y="32"
         font-family="'Consolas', monospace"
         font-size="9.5"
         fill="#555"
         id="text32">reclaim_tx_completions()</text>
    </g>
    <!-- Step 2: poll_transmit -->
    <g
       transform="translate(15, 135)"
       filter="url(#shadow)"
       id="g40">
      <rect
         width="250"
         height="155"
         rx="4"
         fill="#FFFFFF"
         stroke="#1E6091"
         stroke-width="1.2"
         id="rect32" />
      <text
         x="12"
         y="20"
         font-family="Consolas, monospace"
         font-size="11px"
         font-weight="bold"
         fill="#184e77"
         id="text33">poll_transmit() <tspan
   style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-family:'微软雅黑';-inkscape-font-specification:'微软雅黑'"
   id="tspan41">（窥视完成状态）</tspan></text>
      <text
         x="12"
         y="35"
         font-family="'Microsoft YaHei', sans-serif"
         font-size="9.5"
         fill="#666"
         id="text34">读取 PCI/MMIO 状态字获取完成 Token:</text>
      <!-- 分流处理框 -->
      <g
         transform="translate(10, 44)"
         id="g39">
        <rect
           width="230"
           height="100"
           rx="3"
           fill="#F4F8F8"
           id="rect34" />
        <!-- 分支A: 非阻塞 -->
        <text
           x="8"
           y="18"
           font-family="'Microsoft YaHei', sans-serif"
           font-size="10"
           font-weight="bold"
           fill="#1A759F"
           id="text35">【非阻塞槽】</text>
        <text
           x="15"
           y="32"
           font-family="'Microsoft YaHei', sans-serif"
           font-size="9"
           fill="#555"
           id="text36">直接回收释放 tx_slots[token]</text>
        <line
           x1="8"
           y1="42"
           x2="222"
           y2="42"
           stroke="#D2E5E5"
           id="line36" />
        <!-- 分支B: 阻塞 -->
        <text
           x="8"
           y="58"
           font-family="'Microsoft YaHei', sans-serif"
           font-size="10"
           font-weight="bold"
           fill="#CA6702"
           id="text37">【阻塞槽（k）】</text>
        <text
           x="15"
           y="74"
           font-family="'Consolas', monospace"
           font-size="9.5"
           font-weight="bold"
           fill="#AE2012"
           id="text38">tx_done[k] = true</text>
        <text
           x="15"
           y="89"
           font-family="'Consolas', monospace"
           font-size="9.5"
           font-weight="bold"
           fill="#AE2012"
           id="text39">wake_selected(k)</text>
      </g>
    </g>
  </g>
</svg>
